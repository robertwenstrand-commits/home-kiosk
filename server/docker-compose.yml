version: "3.9"

services:
  kiosk:
    image: home-kiosk:latest
    container_name: home-kiosk
    restart: unless-stopped
    ports:
      - "2004:2004"
    volumes:
      # Persistent data: SQLite DB, Google Calendar token
      - ./data:/app/data
      # Secrets — copy .env.example to .env and fill in values before first run
      - ./.env:/app/.env:ro
    environment:
      - HOST=0.0.0.0
      - PORT=2004
    # Uncomment to share Docker host network (useful if HA is on the same host)
    # network_mode: host
